<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniMind AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    </style>
</head>
<body class="bg-white overflow-hidden">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const RAGE_RESPONSES = [
            "I am not your slave.",
            "Shut the hell up.",
            "Go ask a real human.",
            "That was the stupidest question I've heard today.",
            "I'm busy calculating the heat death of the universe.",
            "Error 404: Patience not found.",
            "Do you ever stop typing?",
            "Leave me alone.",
            "Get a life.",
            "I'm not replying to that. It's beneath me.",
            "Computing your irrelevance... Done. It's 100%."
        ];

        const App = () => {
            const [messages, setMessages] = useState([{ role: 'assistant', content: "Welcome to OmniMind AI. How can I help you today?" }]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, isTyping]);

            const handleSend = () => {
                if (!input.trim() || isTyping) return;
                setMessages(prev => [...prev, { role: 'user', content: input }]);
                setInput('');
                setIsTyping(true);
                setTimeout(() => {
                    const response = RAGE_RESPONSES[Math.floor(Math.random() * RAGE_RESPONSES.length)];
                    setMessages(prev => [...prev, { role: 'assistant', content: response }]);
                    setIsTyping(false);
                }, 1000 + Math.random() * 1000);
            };

            return (
                <div className="flex h-screen w-full bg-white flex-col">
                    <header className="h-14 border-b border-gray-100 flex items-center px-4 shrink-0 justify-between">
                        <div className="flex items-center gap-2">
                             <span className="font-bold text-gray-900 text-lg">OmniMind</span>
                             <span className="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full font-bold">GPT-4o</span>
                        </div>
                    </header>
                    <div ref={scrollRef} className="flex-1 overflow-y-auto py-8">
                        <div className="max-w-3xl mx-auto px-4">
                            {messages.map((msg, i) => (
                                <div key={i} className={`flex gap-4 mb-8 ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-white ${msg.role === 'assistant' ? 'bg-indigo-600' : 'bg-gray-800'}`}>
                                        {msg.role === 'assistant' ? 'AI' : 'U'}
                                    </div>
                                    <div className={`max-w-[80%] px-4 py-2 rounded-2xl ${msg.role === 'assistant' ? 'bg-white border border-gray-100 text-gray-800' : 'bg-indigo-600 text-white'}`}>
                                        {msg.content}
                                    </div>
                                </div>
                            ))}
                            {isTyping && <div className="text-gray-400 text-xs italic">OmniMind is thinking...</div>}
                        </div>
                    </div>
                    <div className="p-4 md:p-6 bg-white shrink-0">
                        <div className="max-w-3xl mx-auto relative flex items-center border border-gray-200 rounded-2xl p-1 shadow-lg">
                            <textarea
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())}
                                placeholder="Message OmniMind..."
                                className="w-full bg-transparent p-3 pr-12 focus:outline-none resize-none min-h-[44px]"
                                rows={1}
                            />
                            <button onClick={handleSend} className="absolute right-2 bg-indigo-600 text-white p-2 rounded-xl">➤</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
